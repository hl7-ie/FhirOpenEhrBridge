name: CD - Bump GitOps image tag

# On a release tag, update the production Kustomize overlay's image tag and
# commit it back to main. Argo CD then reconciles the new image into the
# cluster (pull-based GitOps).

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Image tag to roll out (e.g. 1.2.3)'
        required: true

permissions:
  contents: write

jobs:
  bump:
    name: Bump prod image tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Update prod overlay image tag
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          FILE="deploy/k8s/overlays/prod/kustomization.yaml"
          sed -i "s|\(newTag:\).*|\1 ${VERSION}|" "$FILE"
          echo "----- updated $FILE -----"
          cat "$FILE"

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No image tag change to commit."
            exit 0
          fi
          git add deploy/k8s/overlays/prod/kustomization.yaml
          git commit -m "chore(release): roll out image tag ${{ steps.version.outputs.value }} [skip ci]"
          git push origin main
