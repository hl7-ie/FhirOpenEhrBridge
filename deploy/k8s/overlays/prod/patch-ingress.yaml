apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bridge-api
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - bridge.example.com
      secretName: bridge-api-tls
  rules:
    - host: bridge.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bridge-api
                port:
                  name: http
