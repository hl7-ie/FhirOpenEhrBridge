apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: fhir-openehr-bridge-dev

resources:
  - ../../base

replicas:
  - name: bridge-api
    count: 1

images:
  - name: ghcr.io/hl7-ie/fhiropenehrbridge
    newTag: dev

patches:
  - path: patch-configmap.yaml
  - path: patch-ingress.yaml
  - path: patch-hpa.yaml
