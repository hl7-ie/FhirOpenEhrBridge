name: Release - Publish all images

# Runs only on a version tag (or manual dispatch) and publishes a semver-tagged
# container image for EVERY language. This is intentionally NOT path-filtered:
# a release rebuilds all images together. Per-folder CI (the <lang>-ci.yml
# workflows) handles branch/PR builds and the rolling `latest` tag.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  images:
    name: ${{ matrix.name }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: dotnet
            context: ./dotnet
            file: ./dotnet/src/FhirOpenEhrBridge.Api/Dockerfile
            suffix: ""
          - name: nodejs
            context: ./nodejs
            file: ./nodejs/Dockerfile
            suffix: "-nodejs"
          - name: go
            context: ./go
            file: ./go/Dockerfile
            suffix: "-go"
          - name: java
            context: ./java
            file: ./java/Dockerfile
            suffix: "-java"
          - name: rust
            context: ./rust
            file: ./rust/Dockerfile
            suffix: "-rust"
          - name: python
            context: ./python
            file: ./python/Dockerfile
            suffix: "-python"
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}${{ matrix.suffix }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
