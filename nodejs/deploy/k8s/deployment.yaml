apiVersion: apps/v1
kind: Deployment
metadata:
  name: bridge-api-nodejs
  labels:
    app.kubernetes.io/name: bridge-api-nodejs
    app.kubernetes.io/part-of: fhir-openehr-bridge
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: bridge-api-nodejs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bridge-api-nodejs
        app.kubernetes.io/part-of: fhir-openehr-bridge
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bridge-api
          image: ghcr.io/hl7-ie/fhiropenehrbridge-nodejs:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
