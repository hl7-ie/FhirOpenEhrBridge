apiVersion: apps/v1
kind: Deployment
metadata:
  name: bridge-api-rust
  labels:
    app.kubernetes.io/name: bridge-api-rust
    app.kubernetes.io/part-of: fhir-openehr-bridge
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: bridge-api-rust
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bridge-api-rust
        app.kubernetes.io/part-of: fhir-openehr-bridge
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bridge-api
          image: ghcr.io/hl7-ie/fhiropenehrbridge-rust:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
          resources:
            requests:
              cpu: "25m"
              memory: "16Mi"
            limits:
              cpu: "500m"
              memory: "128Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
