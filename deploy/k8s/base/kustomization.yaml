apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: fhir-openehr-bridge

commonLabels:
  app.kubernetes.io/part-of: fhir-openehr-bridge
  app.kubernetes.io/managed-by: kustomize

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - deployment.yaml
  - service.yaml
  - hpa.yaml
  - ingress.yaml

images:
  - name: ghcr.io/hl7-ie/fhiropenehrbridge
    newTag: latest
