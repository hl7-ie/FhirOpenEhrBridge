apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bridge-api
  labels:
    app.kubernetes.io/name: bridge-api
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: bridge.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bridge-api
                port:
                  name: http
