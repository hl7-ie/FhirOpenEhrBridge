apiVersion: apps/v1
kind: Deployment
metadata:
  name: bridge-api
  labels:
    app.kubernetes.io/name: bridge-api
    app.kubernetes.io/part-of: fhir-openehr-bridge
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: bridge-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bridge-api
        app.kubernetes.io/part-of: fhir-openehr-bridge
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - name: bridge-api
          # Overridden per-overlay via `kustomize edit set image`.
          image: ghcr.io/hl7-ie/fhiropenehrbridge:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: bridge-api-config
            - secretRef:
                name: bridge-api-secret
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
