name: Publish NuGet Packages

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Semantic version to pack (e.g. 1.2.3)'
        required: true

permissions:
  contents: read
  packages: write

env:
  DOTNET_VERSION: '8.0.x'
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'

jobs:
  publish:
    name: Pack & Publish
    runs-on: ubuntu-latest
    env:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Derive version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore
        run: dotnet restore FhirOpenEhrBridge.sln

      - name: Build
        run: dotnet build FhirOpenEhrBridge.sln --configuration Release --no-restore

      - name: Pack Domain & Application
        run: |
          dotnet pack src/FhirOpenEhrBridge.Domain/FhirOpenEhrBridge.Domain.csproj \
            --configuration Release --no-build \
            -p:PackageVersion=${{ steps.version.outputs.value }} \
            --output ./artifacts
          dotnet pack src/FhirOpenEhrBridge.Application/FhirOpenEhrBridge.Application.csproj \
            --configuration Release --no-build \
            -p:PackageVersion=${{ steps.version.outputs.value }} \
            --output ./artifacts

      - name: Push to GitHub Packages
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --api-key "${{ secrets.GITHUB_TOKEN }}" \
            --skip-duplicate

      - name: Push to NuGet.org
        if: ${{ env.NUGET_API_KEY != '' }}
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --source "https://api.nuget.org/v3/index.json" \
            --api-key "${{ env.NUGET_API_KEY }}" \
            --skip-duplicate

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts/*.nupkg
          retention-days: 30
